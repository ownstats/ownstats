service: ownstats-${file(../.ownstats.json):id}-backend

frameworkVersion: '3'
useDotenv: true
projectDir: '../'

plugins:
  - serverless-iam-roles-per-function
  - serverless-prune-plugin
  - serverless-esbuild

custom:

  # DynamoDB
  dynamodb:
    name: '${self:service}-table-${self:provider.stage}'

  # SES email address / domain
  # Hint: The email address needs to exists, as the verification message will be automatically
  #       sent there. Only once you confirmed this address, SES will start to send messages from
  #       this address.
  emailDomain: '${file(../.ownstats.json):emailDomainName}'

  # Cognito:
  cognito:
    userPoolName: '${self:service}-user-pool-${self:provider.stage}'

  # esbuild settings
  esbuild:
    bundle: true
    minify: false
    exclude:
      - duckdb

  # Prune plugin
  prune:
    automatic: true
    number: 3

provider:
  name: aws
  runtime: nodejs16.x
  region: ${opt:region, 'us-east-1'}
  stage: ${opt:stage, 'prd'}
  logRetentionInDays: 7
  environment:
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1' # Enable HTTP keep-alive connections for the AWS SDK
    TABLE_NAME: '${self:custom.dynamodb.name}'
    STAGE: '${self:provider.stage}'
    LOG_LEVEL: 'debug'

functions:
  preSignUp:
    handler: functions/auth/preSignUp.handler

  defineAuthChallenge:
    handler: functions/auth/defineAuthChallenge.handler

  createAuthChallenge:
    handler: functions/auth/createAuthChallenge.handler
    environment:
      SES_FROM_ADDRESS: noreply@${self:custom.emailDomain}
    iamRoleStatements:
      - Effect: Allow
        Action: ses:SendEmail
        Resource: 
          - !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${self:custom.domain}
          - !Sub arn:aws:ses:${AWS::Region}:${AWS::AccountId}:configuration-set/*

  verifyAuthChallengeResponse:
    handler: functions/auth/verifyAuthChallengeResponse.handler

  # Query router for domain data
  domainQueryRouter:
    handler: functions/query/queryRouter.handler
    memorySize: 1024
    timeout: 30
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:GetItem
        Resource: !Sub '${DataTable.Arn}'
      - Effect: Allow
        Action:
          - lambda:InvokeFunction
        Resource: !Sub 'arn:aws:lambda:${self:provider.region}:${AWS::AccountId}:function:saasup-${file(../.saasup.json):id}-backend-${self:provider.stage}-queryBackend*'
    events:
      - http:
          path: ${self:custom.api.version}/organization/domains/{domainName}/queryRouter
          method: post
          cors: true
          parameters:
            paths:
              domainName: true
          authorizer:
            name: authorize
            resultTtlInSeconds: 0
  
  # Query backend 1
  queryBackend1:
    handler: functions/query/queryBackend.handler
    memorySize: 10240
    timeout: 60
    reservedConcurrency: 1
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:PutItem
          - dynamodb:DeleteItem
        Resource: !Sub '${DataTable.Arn}'
      - Effect: Allow
        Action:
          - s3:GetObject
        Resource: 'arn:aws:s3:::saasup-${file(../.saasup.json):id}-cdnlogs-${self:provider.stage}/incoming/*'
      - Effect: Allow
        Action:
          - s3:ListBucket
        Resource:
          - 'arn:aws:s3:::saasup-${file(../.saasup.json):id}-cdnlogs-${self:provider.stage}'
    layers:
      - 'arn:aws:lambda:${self:provider.region}:041475135427:layer:duckdb-nodejs-x86:3'

  # Query backend 2
  queryBackend2:
    handler: functions/query/queryBackend.handler
    memorySize: 10240
    timeout: 60
    reservedConcurrency: 1
    iamRoleStatements:
      - Effect: Allow
        Action:
          - dynamodb:Query
          - dynamodb:PutItem
          - dynamodb:DeleteItem
        Resource: !Sub '${DataTable.Arn}'
      - Effect: Allow
        Action:
          - s3:GetObject
        Resource: 'arn:aws:s3:::saasup-${file(../.saasup.json):id}-cdnlogs-${self:provider.stage}/incoming/*'
      - Effect: Allow
        Action:
          - s3:ListBucket
        Resource:
          - 'arn:aws:s3:::saasup-${file(../.saasup.json):id}-cdnlogs-${self:provider.stage}'
    layers:
      - 'arn:aws:lambda:${self:provider.region}:041475135427:layer:duckdb-nodejs-x86:3'

resources:

  - ${file(resources/dynamodb-table.yml)}
  - ${file(resources/cognito.yml)}
  - ${file(resources/outputs.yml)}

package:
  individually: true
